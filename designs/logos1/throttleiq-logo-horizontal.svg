<svg viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#12161B"/>
      <stop offset="100%" stop-color="#0B0D10"/>
    </linearGradient>
    <linearGradient id="arcGrad" x1="165.49" y1="360.51" x2="346.51" y2="360.51" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="55%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#FF6A00"/>
    </linearGradient>
    <radialGradient id="tipGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6A00" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FF6A00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- badge / icon, scaled + translated copy of the app icon mark -->
  <g transform="translate(20,30) scale(0.390625)">
    <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
    <rect x="1" y="1" width="510" height="510" rx="111" fill="none" stroke="#1E242C" stroke-width="2"/>
    <path d="M 165.49,360.51 A 128,128 0 1 1 346.51,360.51"
          fill="none" stroke="url(#arcGrad)" stroke-width="26" stroke-linecap="round"/>
    <g stroke="#475569" stroke-width="4" stroke-linecap="round" opacity="0.55">
      <line x1="165.49" y1="360.51" x2="180.2" y2="349.9"/>
      <line x1="197.8" y1="163.5" x2="207.6" y2="180.2"/>
      <line x1="314.2" y1="163.5" x2="304.4" y2="180.2"/>
      <line x1="346.51" y1="360.51" x2="331.8" y2="349.9"/>
    </g>
    <line x1="256" y1="270" x2="361.25" y2="231.7" stroke="#F8FAFC" stroke-width="9" stroke-linecap="round"/>
    <circle cx="256" cy="270" r="16" fill="#0B0D10" stroke="#F8FAFC" stroke-width="4"/>
    <circle cx="376.28" cy="226.22" r="34" fill="url(#tipGlow)"/>
    <circle cx="376.28" cy="226.22" r="11" fill="#FF6A00"/>
    <circle cx="376.28" cy="226.22" r="18" fill="none" stroke="#FF6A00" stroke-width="2.5" opacity="0.6"/>
  </g>

  <!-- wordmark -->
  <text x="250" y="150" font-size="76" font-weight="600" fill="#F8FAFC" letter-spacing="-1">Throttle<tspan font-weight="800" fill="#FF6A00">IQ</tspan></text>

  <!-- tagline -->
  <text x="252" y="188" font-size="21" font-weight="400" fill="#94A3B8" letter-spacing="1.5">MACHINE MEMORY FOR MOTORCYCLES</text>
</svg>
