<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#12161B"/>
      <stop offset="100%" stop-color="#0B0D10"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F8FAFC" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#F8FAFC" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- app-icon background -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="1" y="1" width="510" height="510" rx="111" fill="none" stroke="#1E242C" stroke-width="2"/>

  <!-- gauge: three riding zones. eco (blue) -> smart/optimal (green) -> redline (orange, small + off to the side) -->
  <path d="M 165.49,360.51 A 128,128 0 0 1 165.49,179.49" fill="none" stroke="#3B82F6" stroke-width="26" stroke-linecap="round"/>
  <path d="M 165.49,179.49 A 128,128 0 0 1 289.13,146.36" fill="none" stroke="#22C55E" stroke-width="26" stroke-linecap="round"/>
  <path d="M 289.13,146.36 A 128,128 0 0 1 346.51,360.51" fill="none" stroke="#FF6A00" stroke-width="26" stroke-linecap="round" opacity="0.85"/>

  <!-- zone-boundary ticks -->
  <g stroke="#475569" stroke-width="4" stroke-linecap="round" opacity="0.55">
    <line x1="165.49" y1="360.51" x2="180.2" y2="349.9"/>
    <line x1="346.51" y1="360.51" x2="331.8" y2="349.9"/>
  </g>

  <!-- needle: rests in the smart / optimal zone, well short of redline -->
  <line x1="256" y1="270" x2="227.01" y2="161.82" stroke="#F8FAFC" stroke-width="9" stroke-linecap="round"/>
  <circle cx="256" cy="270" r="16" fill="#0B0D10" stroke="#F8FAFC" stroke-width="4"/>

  <!-- neural node cluster at the needle tip: the "IQ" reading the ride, not revving it -->
  <circle cx="224.42" cy="152.16" r="30" fill="url(#nodeGlow)"/>
  <g stroke="#94A3B8" stroke-width="2.5" opacity="0.8">
    <line x1="224.42" y1="152.16" x2="242.42" y2="160.16"/>
    <line x1="224.42" y1="152.16" x2="210.42" y2="136.16"/>
    <line x1="224.42" y1="152.16" x2="240.42" y2="136.16"/>
  </g>
  <circle cx="242.42" cy="160.16" r="5.5" fill="#60A5FA"/>
  <circle cx="210.42" cy="136.16" r="5.5" fill="#22C55E"/>
  <circle cx="240.42" cy="136.16" r="5.5" fill="#F8FAFC"/>
  <circle cx="224.42" cy="152.16" r="9" fill="#F8FAFC"/>
</svg>
