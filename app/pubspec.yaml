name: throttleiq
description: Motorcycle tracking, intelligence, and memory platform
publish_to: 'none'
version: 2.0.0-beta.4+6

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.0.0
  firebase_messaging: ^15.0.0
  cloud_firestore: ^5.0.0
  google_sign_in: ^6.1.0

  # Maps & Location
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^11.0.0

  # Sensors
  sensors_plus: ^4.0.2

  # Local Database (Offline-first)
  sqflite: ^2.3.2
  path: ^1.9.0

  # Networking
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  # Image
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  image: ^4.1.0

  # Haptics / Feedback
  vibration: ^2.0.0
  flutter_local_notifications: ^17.2.0

  # Background tracking
  wakelock_plus: ^1.2.8

  # Sharing
  share_plus: ^10.0.0

  # Battery
  battery_plus: ^6.0.2

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0

  # Storage
  shared_preferences: ^2.2.3
  path_provider: ^2.1.1

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  collection: ^1.18.0
  equatable: ^2.0.5
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.4
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  image_path: "assets/images/app_icon.png"
  image_path_android: "assets/images/app_icon_android.png"
  image_path_ios: "assets/images/app_icon_ios.png"
  android: true
  ios: true
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
